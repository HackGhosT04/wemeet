<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VideoMeet{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav>
        <a href="/">Home</a>
        {% if request.session.get("token") %}
            <a href="/dashboard">Dashboard</a>
            <a href="/logout">Logout</a>
        {% else %}
            <a href="/login">Login</a>
            <a href="/signup">Sign Up</a>
        {% endif %}
    </nav>
    {% if request.query_params.get("join_error") == "missing" %}
    <main>
        <div class="error" style="max-width: 720px; margin: 1rem auto 0;">That meeting code does not exist or is no longer active.</div>
    </main>
    {% endif %}
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
